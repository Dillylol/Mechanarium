services:
  - type: web
    name: mechanarium-agent
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:agent
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: AGENT_ALLOWED_ORIGINS
        value: https://dillylol.github.io
      - key: AGENT_RATE_LIMIT
        value: "20"
      - key: AGENT_TIMEOUT_MS
        value: "25000"
